<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OC 命运生成器</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f0f12; color: #e0e0e0; line-height: 1.6; padding: 20px; }
    .container { max-width: 900px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 10px; color: #00d4ff; }
    .subtitle { text-align: center; color: #888; margin-bottom: 30px; }
    .axis-group { background: #1a1a20; border-radius: 8px; padding: 15px; margin-bottom: 15px; }
    .axis-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .axis-head h3 { font-size: 16px; color: #fff; }
    .chip { background: #00d4ff; color: #000; padding: 2px 8px; border-radius: 12px; font-size: 12px; }
    .options { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px; }
    .option-item { display: flex; align-items: flex-start; padding: 8px; background: #25252d; border-radius: 6px; cursor: pointer; }
    .option-item:hover { background: #2a2a35; }
    .option-item input { margin-right: 8px; margin-top: 4px; }
    .option-name { font-size: 13px; color: #fff; }
    .option-desc { font-size: 11px; color: #888; margin-top: 2px; }
    .controls { text-align: center; margin: 30px 0; }
    .btn { background: #00d4ff; color: #000; border: none; padding: 12px 30px; font-size: 16px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    .btn:hover { background: #00b8e6; }
    .btn:disabled { background: #555; cursor: not-allowed; }
    .status { text-align: center; padding: 10px; margin-bottom: 20px; border-radius: 8px; background: #1a1a20; }
    .result-panel { background: #1a1a20; border-radius: 8px; padding: 20px; margin-top: 20px; white-space: pre-wrap; }
    .result-title { color: #00d4ff; margin: 15px 0 8px; }
    .result-line { margin: 5px 0; }
    .result-bullet { margin-left: 20px; color: #aaa; }
    .extra-input { width: 100%; padding: 12px; background: #25252d; border: 1px solid #333; color: #fff; border-radius: 8px; margin-bottom: 20px; }
    footer { text-align: center; margin-top: 40px; color: #666; font-size: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎭 OC 命运生成器</h1>
    <p class="subtitle">选择轴要素，一键生成男主设定与命运骨架</p>
    
    <div id="axisContainer"></div>
    
    <textarea id="extraPrompt" class="extra-input" placeholder="补充偏好（可选）：例如「想要更强烈的冲突感」、「希望男主更温柔一些」..." rows="3"></textarea>
    
    <div class="controls">
      <p id="selectedCount" style="margin-bottom: 15px; color: #888;">已选 0 项</p>
      <button id="generateBtn" class="btn">✨ 生成设定</button>
    </div>
    
    <div id="status" class="status"></div>
    
    <div id="result" class="result-panel" style="display:none;"></div>
    
    <footer>
      <p>Code: MIT | Art/Content: 非商用学习用途</p>
      <p><a href="https://github.com/Yuqing-Cai/oc-interactive-web" style="color: #00d4ff;">GitHub</a></p>
    </footer>
  </div>
  
  <script src="app.js"></script>
</body>
</html>
